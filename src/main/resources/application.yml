server:
  port: 8080

spring:
  application:
    name: vendor-risk-scorecard

  datasource:
    url: jdbc:postgresql://localhost:5432/vendor_risk_db
    username: admin
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  redis:
    host: localhost
    port: 6379

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

jwt:
  secret: averylongsecretkeythatneedstobeatleast256bitslongforhs256algorithmtofunctionproperly
  expiration: 86400000 # 1 day in milliseconds
