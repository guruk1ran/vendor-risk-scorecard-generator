spring.application.name=vendorrisk

# H2 in-memory database (dev/test)
spring.datasource.url=jdbc:h2:mem:vendordb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Let Flyway manage the schema — disable Hibernate DDL
spring.jpa.hibernate.ddl-auto=none

# H2 console for debugging
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Show SQL in logs
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway — use H2-compatible migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT secret (override via env var in production)
app.jwt.secret=${JWT_SECRET:vendorrisk-super-secret-key-for-dev-only-change-in-prod}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# File upload limits
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
